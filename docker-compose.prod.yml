version: '3.8'

services:
  cantik-ai:
    build: .
    container_name: cantik-ai-production
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - database:/app/database
    env_file:
      - .env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - cantik-ai-network

  nginx:
    image: nginx:alpine
    container_name: cantik-ai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - cantik-ai
    restart: unless-stopped
    networks:
      - cantik-ai-network

volumes:
  uploads:
    driver: local
  database:
    driver: local

networks:
  cantik-ai-network:
    driver: bridge