version: '3.8'

services:
  cantik-ai:
    build: .
    container_name: cantik-ai-production
    ports:
      - "8000:8000"   # Backend API
      - "5173:5173"   # PWA + embedded admin
      - "5174:5174"   # Admin standalone
      - "5175:5175"   # Kiosk
      - "5176:5176"   # Desktop
    volumes:
      - uploads:/app/uploads
      - database:/app/database
    environment:
      - NODE_ENV=production
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx reverse proxy untuk production
  nginx:
    image: nginx:alpine
    container_name: cantik-ai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - cantik-ai
    restart: unless-stopped

volumes:
  uploads:
  database: