version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: kios-backend
    restart: unless-stopped
    # Menggunakan network host agar mudah konek ke MySQL aaPanel (127.0.0.1)
    network_mode: "host"
    volumes:
      # Gunakan jalur absolut untuk memastikan mapping ke VPS benar
      - /www/wwwroot/kios-skin-analyzer.cantik.ai/backend/uploads:/app/uploads
    env_file:
      - ./backend/.env
    # Memastikan container menunggu network siap
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend-pwa:
    build: 
      context: ./platforms/pwa
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api-kios.cantik.ai}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-https://api-kios.cantik.ai}
        VITE_PRODUCTS_API_URL: ${VITE_PRODUCTS_API_URL:-https://api-kios.cantik.ai/api/v2/products}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: kios-frontend-pwa
    ports:
      - "3003:80"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"