version: '3.8'

services:
  cantik-ai-dev:
    build:
      context: .
      target: base
    container_name: cantik-ai-dev
    ports:
      - "8000:8000"   # Backend API
      - "5173:5173"   # PWA + embedded admin
      - "5174:5174"   # Admin standalone
      - "5175:5175"   # Kiosk
      - "5176:5176"   # Desktop
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=development
      - PORT=8000
    command: npm run dev:all
    restart: unless-stopped
    stdin_open: true
    tty: true